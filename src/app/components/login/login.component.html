<div class="login-page">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title class="login-header-text">Sign in</mat-card-title>
      <mat-card-subtitle>Use your username and password</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form (ngSubmit)="submit()" #form="ngForm">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Username</mat-label>
          <input
            matInput
            name="username"
            [(ngModel)]="username"
            required
            autocomplete="username"
          />
          <mat-error *ngIf="form.submitted && !username">Username is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Password</mat-label>
          <input
            matInput
            type="password"
            name="password"
            [(ngModel)]="password"
            required
            autocomplete="current-password"
          />
          <mat-error *ngIf="form.submitted && !password">Password is required</mat-error>
        </mat-form-field>

        <mat-error *ngIf="error" class="error">{{ error }}</mat-error>

        <button
          mat-raised-button
          color="primary"
          class="full"
          type="submit"
        >
          Login
        </button>
      </form>
      <a routerLink="/register">Create account</a>
    </mat-card-content>
  </mat-card>
</div>
