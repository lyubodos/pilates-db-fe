<div class="container user-data_container">
  <button
    mat-raised-button
    color="primary"
    (click)="navigateToAddUser()">
    Add User
  </button>
  <h2 class="users-header">Current users</h2>
  <!-- Material Table -->
  @if (users$ | async; as users) {
    <table
      mat-table
      [dataSource]="users"
      class="mat-elevation-z8 full-width-table">

      <!-- First Name Column -->
      <ng-container matColumnDef="firstName">
        <th mat-header-cell *matHeaderCellDef class="mat_header_title"> First Name</th>
        <td mat-cell *matCellDef="let user">
          {{ user.firstName }}
        </td>
      </ng-container>

      <!-- Last Name Column -->
      <ng-container matColumnDef="lastName">
        <th mat-header-cell *matHeaderCellDef class="mat_header_title"> Last Name</th>
        <td mat-cell *matCellDef="let user">
          {{ user.lastName }}
        </td>
      </ng-container>

      <!-- Email Column -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef class="mat_header_title"> Email</th>
        <td mat-cell *matCellDef="let user">
          {{ user.email }}
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="mat_header_title"> Action</th>
        <td mat-cell *matCellDef="let user">

          <button
            mat-stroked-button
            color="primary"
            class="me-2"
            (click)="onUpdateUser(user)">
            Update
          </button>

          <button
            mat-raised-button
            color="warn"
            (click)="openDeleteDialog(user)">
            Delete
          </button>
        </td>
      </ng-container>

      <!-- Header & Row Declarations -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

    @if (users.length === 0){
      <p class="text-center mt-5">No current users found.</p>
    }

  }
  <!-- Delete confirmation dialog template -->
  <ng-template #deleteDialog let-data>
    <h2 mat-dialog-title>Confirm Delete</h2>

    <mat-dialog-content>
      Are you sure you want to delete
      <strong>{{ data.firstName }} {{ data.lastName }}</strong>?
    </mat-dialog-content>

    <mat-dialog-actions align="end">
      <button mat-button mat-dialog-close="false">Cancel</button>
      <button mat-raised-button color="warn" mat-dialog-close="true">
        Delete
      </button>
    </mat-dialog-actions>
  </ng-template>
</div>
